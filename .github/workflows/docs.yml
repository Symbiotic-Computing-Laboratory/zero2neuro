name: Deploy Docs

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Install Jekyll
        run: gem install jekyll just-the-docs

      - name: Set deploy folder
        id: folder
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "folder=stable" >> $GITHUB_OUTPUT
          else
            echo "folder=dev" >> $GITHUB_OUTPUT
          fi

      - name: Build Jekyll site
        run: |
          jekyll build --destination ./_site
        env:
          JEKYLL_ENV: production

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          destination_dir: ${{ steps.folder.outputs.folder }}
          keep_files: true
